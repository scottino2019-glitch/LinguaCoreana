<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coreano Master - Database Verbi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .korean { font-family: 'Noto Sans KR', sans-serif; }
        .verb-card:hover { transform: translateY(-2px); transition: all 0.2s; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <div class="max-w-6xl mx-auto px-4 py-8">
        <!-- Header -->
        <header class="text-center mb-12">
            <h1 class="text-4xl font-black text-slate-900 mb-2">Dizionario Verbi Coreani</h1>
            <p class="text-slate-500 text-lg">Consulta la coniugazione e le irregolarità dei verbi più comuni.</p>
        </header>

        <!-- Barra di Ricerca e Filtri -->
        <div class="bg-white p-6 rounded-3xl shadow-sm mb-8">
            <div class="flex flex-col lg:flex-row gap-4">
                <div class="flex-grow relative">
                    <span class="absolute left-4 top-3.5 text-slate-400">🔍</span>
                    <input type="text" id="searchInput" placeholder="Cerca in italiano o coreano..." 
                           class="w-full pl-12 pr-4 py-3 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div class="flex flex-wrap gap-2">
                    <button onclick="filterType('all')" class="filter-btn px-4 py-2 rounded-xl bg-blue-600 text-white font-medium" data-type="all">Tutti</button>
                    <button onclick="filterType('action')" class="filter-btn px-4 py-2 rounded-xl bg-slate-100 hover:bg-slate-200 font-medium" data-type="action">Azioni</button>
                    <button onclick="filterType('descriptive')" class="filter-btn px-4 py-2 rounded-xl bg-slate-100 hover:bg-slate-200 font-medium" data-type="descriptive">Aggettivi</button>
                    <button onclick="filterType('irregular')" class="filter-btn px-4 py-2 rounded-xl bg-slate-100 hover:bg-slate-200 font-medium" data-type="irregular">Irregolari</button>
                </div>
            </div>
        </div>

        <!-- Griglia Verbi -->
        <div id="verbGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- I verbi verranno inseriti qui da JavaScript -->
        </div>

        <!-- Empty State -->
        <div id="noResults" class="hidden text-center py-20">
            <p class="text-slate-400 text-xl italic">Nessun verbo trovato per questa ricerca.</p>
        </div>
    </div>

    <!-- Modal per Dettagli Verbo (Opzionale, per ora mostriamo tutto nella card) -->

    <script>
        let verbDb = [];
let currentFilter = 'all';

// Funzione asincrona per caricare il file JSON esterno
async function loadVerbs() {
    try {
        const response = await fetch('verbi.json');
        if (!response.ok) throw new Error("File JSON non trovato");
        verbDb = await response.json();
        renderVerbs();
    } catch (error) {
        console.error("Errore di caricamento:", error);
        document.getElementById('verbGrid').innerHTML = 
            '<p class="col-span-full text-center text-slate-400">Caricamento verbi fallito...</p>';
    }
}

function renderVerbs() {
    const grid = document.getElementById('verbGrid');
    const noResults = document.getElementById('noResults');
    const search = document.getElementById('searchInput').value.toLowerCase();
    
    grid.innerHTML = '';
    
    const filtered = verbDb.filter(v => {
        const matchesSearch = v.base.includes(search) || v.translation.toLowerCase().includes(search);
        const matchesType = currentFilter === 'all' || v.type === currentFilter;
        return matchesSearch && matchesType;
    });

    if (filtered.length === 0) {
        noResults.classList.remove('hidden');
    } else {
        noResults.classList.add('hidden');
        filtered.forEach(v => {
            const card = document.createElement('div');
            card.className = "verb-card bg-white p-6 rounded-3xl shadow-sm border border-slate-100 hover:border-blue-200";
            card.innerHTML = `
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <h3 class="korean text-3xl font-bold text-slate-900">${v.base}</h3>
                        <p class="text-slate-500 font-medium">${v.translation}</p>
                    </div>
                    <span class="text-[10px] uppercase font-bold px-2 py-1 rounded-md ${v.type === 'action' ? 'bg-orange-100 text-orange-600' : 'bg-teal-100 text-teal-600'}">
                        ${v.type === 'action' ? 'Azione' : 'Aggettivo'}
                    </span>
                </div>
                <div class="space-y-3 mb-6">
                    <div class="flex justify-between border-b border-slate-50 pb-2">
                        <span class="text-slate-400 text-sm italic">Standard Polite</span>
                        <span class="korean text-lg font-bold text-blue-600">${v.polite}</span>
                    </div>
                </div>
                <div class="bg-slate-50 p-3 rounded-2xl">
                    <p class="text-[11px] text-slate-400 uppercase font-bold mb-1">Esempio</p>
                    <p class="korean text-slate-700 text-sm">${v.example || '-'}</p>
                </div>
            `;
            grid.appendChild(card);
        });
    }
}

function filterType(type) {
    currentFilter = type;
    document.querySelectorAll('.filter-btn').forEach(btn => {
        const isActive = btn.dataset.type === type;
        btn.classList.toggle('bg-blue-600', isActive);
        btn.classList.toggle('text-white', isActive);
        btn.classList.toggle('bg-slate-100', !isActive);
    });
    renderVerbs();
}

document.getElementById('searchInput').addEventListener('input', renderVerbs);
window.onload = loadVerbs;

    </script>
</body>
</html>
