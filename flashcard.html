<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progetto Forgiato - Coreano Veloce Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Poppins:wght@400;600;800&display=swap');

        .korean-flashcard-app {
            font-family: 'Poppins', 'Noto Sans KR', sans-serif;
            background-color: #f0f4f8; /* Grigio-bluastro molto chiaro */
        }

        /* Stili personalizzati per la flashcard 3D */
        .flashcard {
            perspective: 1000px;
            min-height: 340px; /* Aumentata leggermente per contenere più testo se necessario */
            cursor: pointer;
            user-select: none;
        }

        .flashcard-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); /* Transizione più fluida */
            transform-style: preserve-3d;
        }

        .flashcard.flipped .flashcard-inner {
            transform: rotateY(180deg);
        }

        .flashcard-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 24px; /* Angoli più morbidi */
            box-shadow: 0 15px 35px -5px rgba(0, 0, 0, 0.15);
            padding: 35px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Stile Fronte (Coreano) */
        .flashcard-front {
            background: linear-gradient(135deg, #FF6B6B, #CD2E3A); 
            color: white;
            border: 4px solid #f0f4f8;
            transition: background 0.3s;
        }
        .flashcard-front:hover {
            background: linear-gradient(135deg, #FF7F7F, #E03541);
        }

        /* Stile Retro (Spiegazione) */
        .flashcard-back {
            background-color: #ffffff; /* Bianco pulito per il retro */
            color: #1a202c;
            transform: rotateY(180deg);
            border: 4px solid #f0f4f8;
            text-align: left;
            justify-content: flex-start;
        }

        .flashcard-back h3 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 12px;
            font-family: 'Noto Sans KR', sans-serif;
            color: #CD2E3A; /* Colore accento rosso sul retro */
            width: 100%;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 8px;
        }
        
        .flashcard-back p {
            font-size: 1.15rem; 
            line-height: 1.6;
            margin-top: 8px;
            color: #2d3748;
        }

        .flashcard-front .emoji {
            font-size: 4.5rem;
            margin-bottom: 1rem;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.3));
        }
        .flashcard-front .korean-text {
            font-size: 3.5rem;
            font-weight: 700;
            font-family: 'Noto Sans KR', sans-serif;
            line-height: 1;
            letter-spacing: -1px;
        }

        /* Stile per i pulsanti dei filtri */
        .filter-btn {
            transition: all 0.2s;
        }
        .filter-btn.active {
            background-color: #CD2E3A;
            color: white;
            box-shadow: 0 4px 6px rgba(205, 46, 58, 0.3);
        }
    </style>
</head>
<body>
    <div class="korean-flashcard-app min-h-screen p-4 sm:p-8">
        <header class="text-center py-12 mb-10">
            <h1 class="text-6xl font-extrabold mb-5 text-red-700 tracking-tighter">🇰🇷 Coreano Veloce Pro 🇰🇷</h1>
            <p class="text-2xl text-gray-700 font-light max-w-3xl mx-auto">Vocabolario esteso, particelle chiave e verbi essenziali per il tuo Coreano.</p>
        </header>

        <div class="container mx-auto px-4">
            <div class="relative max-w-3xl mx-auto mb-6">
                <input type="text" id="search-input" placeholder="Cerca vocabolo, grammatica, tag o spiegazione..." 
                       class="w-full p-6 pl-16 text-xl border-4 border-gray-200 rounded-3xl focus:ring-4 focus:ring-red-300 focus:border-red-500 shadow-2xl transition duration-300 outline-none">
                <i class="fas fa-search absolute left-6 top-1/2 transform -translate-y-1/2 text-gray-400 text-2xl"></i>
            </div>

            <div class="max-w-3xl mx-auto mb-12 flex flex-wrap gap-3 justify-center" id="filter-container">
                <button class="filter-btn bg-white text-gray-800 px-5 py-2.5 rounded-full font-semibold shadow hover:bg-gray-100 active" data-tag="all">Tutti</button>
                <button class="filter-btn bg-white text-gray-800 px-5 py-2.5 rounded-full font-semibold shadow hover:bg-gray-100" data-tag="grammatica">Grammatica</button>
                <button class="filter-btn bg-white text-gray-800 px-5 py-2.5 rounded-full font-semibold shadow hover:bg-gray-100" data-tag="verbo">Verbi</button>
                <button class="filter-btn bg-white text-gray-800 px-5 py-2.5 rounded-full font-semibold shadow hover:bg-gray-100" data-tag="vocabolario">Vocabolario</button>
                <button class="filter-btn bg-white text-gray-800 px-5 py-2.5 rounded-full font-semibold shadow hover:bg-gray-100" data-tag="base">Base</button>
                <button class="filter-btn bg-white text-gray-800 px-5 py-2.5 rounded-full font-semibold shadow hover:bg-gray-100" data-tag="cibo">Cibo</button>
                <button class="filter-btn bg-white text-gray-800 px-5 py-2.5 rounded-full font-semibold shadow hover:bg-gray-100" data-tag="tempo">Tempo</button>
            </div>

            <div id="flashcard-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-10">
                </div>

            <div id="no-results" class="hidden text-center mt-24 p-12 bg-white border-l-8 border-red-500 text-gray-800 max-w-xl mx-auto rounded-2xl shadow-xl">
                <i class="fas fa-search-minus text-5xl mb-5 text-red-400"></i>
                <p class="text-3xl font-bold text-red-700">Nessun match trovato.</p>
                <p class="text-xl mt-3 text-gray-600">Prova un termine diverso o seleziona 'Tutti' nei filtri.</p>
            </div>
        </div>
        
        <footer class="text-center py-16 mt-20 border-t border-gray-200 text-gray-500 bg-white rounded-t-3xl shadow-inner">
            <p class="font-bold text-red-700 text-lg">Progetto Forgiato © 2023</p>
            <p class="mt-1">Impara il Coreano, una card alla volta.</p>
        </footer>
    </div>

    <script>
        const flashcardsData = [
            // --- 22 ORIGINALI ---
            { id: 1, front: "안녕하세요", back: "Ciao, Salve (forma cortese). Usato in quasi tutte le situazioni d'incontro.", emoji: "👋", tags: ["saluto", "base"] },
            { id: 2, front: "감사합니다", back: "Grazie (forma cortese). Si traduce letteralmente con 'sono grato'.", emoji: "🙏", tags: ["cortesia", "base"] },
            { id: 3, front: "네", back: "Sì / Certo / Ho capito. Spesso usato anche solo per riconoscere che si è ascoltato l'interlocutore.", emoji: "✅", tags: ["risposta", "base"] },
            { id: 4, front: "아니요", back: "No / Non lo è. La negazione formale. Per un rifiuto meno formale si usa '아니'.", emoji: "❌", tags: ["risposta", "base"] },
            { id: 5, front: "이/가", back: "Particella Nominativa. Indica il soggetto della frase. '이' dopo consonante, '가' dopo vocale.", emoji: "📝", tags: ["grammatica", "particella", "soggetto"] },
            { id: 6, front: "입니다", back: "È (forma dichiarativa, molto formale). Viene attaccato al nome (N + 입니다) per definire l'identità.", emoji: "🎓", tags: ["grammatica", "verbo", "formale"] },
            { id: 7, front: "사과", back: "Mela. Attenzione: può anche significare 'apology' (scusa). Il contesto definisce il significato.", emoji: "🍎", tags: ["vocabolario", "frutta"] },
            { id: 8, front: "물", back: "Acqua. Molto semplice, una delle prime parole da imparare.", emoji: "💧", tags: ["vocabolario", "liquido", "base"] },
            { id: 9, front: "주세요", back: "Per favore, dammi / Vorrei. Usato per chiedere oggetti o cibo nei negozi e ristoranti.", emoji: "🤲", tags: ["richiesta", "verbo"] },
            { id: 10, front: "어디", back: "Dove. Una domanda fondamentale per chiedere la posizione o la destinazione.", emoji: "🗺️", tags: ["domanda", "avverbio"] },
            { id: 11, front: "저는", back: "Io (soggetto). '저' è il pronome umile di '나', '는' è la particella di argomento.", emoji: "👤", tags: ["pronome", "grammatica", "io"] },
            { id: 12, front: "반가워요", back: "Piacere di conoscerti (forma cortese standard). Si usa dopo essersi presentati.", emoji: "🤝", tags: ["saluto", "sociale"] },
            { id: 13, front: "죄송합니다", back: "Mi dispiace / Scusi (molto formale). Usato per scusarsi seriamente o per passare tra la folla.", emoji: "🙇", tags: ["cortesia", "scuse"] },
            { id: 14, front: "은/는", back: "Particella di Argomento (Topic Marker). Indica di cosa si parla. '은' dopo consonante, '는' dopo vocale.", emoji: "📍", tags: ["grammatica", "particella"] },
            { id: 15, front: "밥", back: "Riso cotto / Pasto. In Corea, 'Hai mangiato?' è un saluto comune per chiedere come stai.", emoji: "🍚", tags: ["vocabolario", "cibo"] },
            { id: 16, front: "커피", back: "Caffè. Una parola di origine inglese (Konglish) facilissima da ricordare.", emoji: "☕", tags: ["vocabolario", "cibo", "bevanda"] },
            { id: 17, front: "있어요", back: "C'è / Esiste / Ho. Esprime sia l'esistenza che il possesso.", emoji: "📦", tags: ["verbo", "base", "esistenza"] },
            { id: 18, front: "없어요", back: "Non c'è / Non esiste / Non ho. Il contrario di 있어요.", emoji: "🚫", tags: ["verbo", "base", "negazione"] },
            { id: 19, front: "얼마예요?", back: "Quanto costa? Indispensabile per fare shopping.", emoji: "💰", tags: ["domanda", "shopping"] },
            { id: 20, front: "친구", back: "Amico. In Corea si usa solo per persone della stessa età cronologica.", emoji: "👫", tags: ["vocabolario", "persone"] },
            { id: 21, front: "집", back: "Casa. Usato sia per indicare l'edificio che il concetto di focolare domestico.", emoji: "🏠", tags: ["vocabolario", "luogo"] },
            { id: 22, front: "해요", back: "Fare (forma cortese). Deriva dal verbo '하다' (hada), il verbo più versatile del coreano.", emoji: "🏃", tags: ["verbo", "base"] },
            
            // --- 10 NUOVE CARD ---
            { id: 23, front: "을/를", back: "Particella Oggetto Diretto. Indica il complemento oggetto della frase. '을' dopo consonante, '를' dopo vocale.", emoji: "🎯", tags: ["grammatica", "particella", "oggetto"] },
            { id: 24, front: "가다", back: "Andare. Verbo di movimento fondamentale.", emoji: "🚶‍♂️", tags: ["verbo", "movimento"] },
            { id: 25, front: "오다", back: "Venire. Il contrario di 가다.", emoji: "🏃‍♀️", tags: ["verbo", "movimento"] },
            { id: 26, front: "먹다", back: "Mangiare. Uno dei verbi più usati in assoluto.", emoji: "🥢", tags: ["verbo", "cibo"] },
            { id: 27, front: "마시다", back: "Bere.", emoji: "🍺", tags: ["verbo", "cibo", "bevanda"] },
            { id: 28, front: "오늘", back: "Oggi.", emoji: "📅", tags: ["vocabolario", "tempo"] },
            { id: 29, front: "내일", back: "Domani.", emoji: "🌅", tags: ["vocabolario", "tempo"] },
            { id: 30, front: "학교", back: "Scuola.", emoji: "🏫", tags: ["vocabolario", "luogo"] },
            { id: 31, front: "일, 이, 삼", back: "Uno, Due, Tre (Numeri Sino-Coreani). Usati per date, minuti, soldi, piani degli edifici.", emoji: "🔢", tags: ["vocabolario", "numeri", "base"] },
            { id: 32, front: "월요일", back: "Lunedì. Tutti i giorni della settimana finiscono con '요일' (yo-il).", emoji: "🌙", tags: ["vocabolario", "tempo"] }
        ];

        let currentTagFilter = 'all';

        function renderFlashcards(cards) {
            const grid = document.getElementById('flashcard-grid');
            const noResults = document.getElementById('no-results');
            grid.innerHTML = '';

            // Filtra per Tag corrente prima di renderizzare
            const filteredByTag = currentTagFilter === 'all' 
                ? cards 
                : cards.filter(card => card.tags.includes(currentTagFilter));

            if (filteredByTag.length === 0) {
                noResults.classList.remove('hidden');
                return;
            }
            noResults.classList.add('hidden');

            filteredByTag.forEach(card => {
                const tagsHtml = card.tags.map(tag => 
                    `<span class="inline-block bg-red-100 text-red-800 text-xs font-semibold rounded-full px-3 py-1 mt-2 mr-1 transition hover:bg-red-200">#${tag}</span>`
                ).join('');

                const cardHtml = `
                    <div id="card-${card.id}" class="flashcard transition transform hover:scale-[1.04] hover:-translate-y-1 duration-300 ease-in-out" onclick="this.classList.toggle('flipped')">
                        <div class="flashcard-inner">
                            <div class="flashcard-face flashcard-front">
                                <div class="emoji">${card.emoji}</div>
                                <div class="korean-text">${card.front}</div>
                            </div>
                            <div class="flashcard-face flashcard-back">
                                <h3 class="font-bold">${card.front}</h3>
                                <p>${card.back}</p>
                                <div class="absolute bottom-5 left-5 right-5 text-xs flex flex-wrap">
                                    ${tagsHtml}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                grid.innerHTML += cardHtml;
            });
        }

        function handleSearchAndFilter() {
            const query = document.getElementById('search-input').value.toLowerCase().trim();
            
            const filteredCards = flashcardsData.filter(card => {
                const searchTarget = (
                    card.front.toLowerCase() + 
                    ' ' + card.back.toLowerCase() + 
                    ' ' + card.tags.join(' ').toLowerCase()
                );
                return searchTarget.includes(query);
            });
            
            renderFlashcards(filteredCards);
        }

        function setupFilters() {
            const container = document.getElementById('filter-container');
            container.addEventListener('click', (e) => {
                if (e.target.classList.contains('filter-btn')) {
                    // Rimuovi 'active' da tutti i bottoni
                    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
                    // Aggiungi 'active' al bottone cliccato
                    e.target.classList.add('active');
                    
                    currentTagFilter = e.target.getAttribute('data-tag');
                    handleSearchAndFilter(); // Riapplica ricerca + nuovo filtro tag
                }
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderFlashcards(flashcardsData);
            setupFilters();
            
            const searchInput = document.getElementById('search-input');
            searchInput.addEventListener('input', handleSearchAndFilter);
        });
    </script>
</body>
</html>
