<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduApp - Lezioni</title>
    <style>
        :root {
            --primary: #00dc64;
            --bg-body: #f0f2f5;
            --bg-surface: #ffffff;
            --text-strong: #1a1a1a;
            --text-muted: #737373;
            --border: #e5e5e5;
            --font-main: system-ui, -apple-system, sans-serif;
            --app-width: 480px;
        }

        body { margin: 0; background-color: var(--bg-body); font-family: var(--font-main); display: flex; justify-content: center; color: var(--text-strong); }
        .app { width: 100%; max-width: var(--app-width); background: var(--bg-surface); min-height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,0.05); padding-bottom: 70px; }

        /* --- Header con Ricerca --- */
        .header {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            background: var(--bg-surface);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
            gap: 15px;
        }

        .brand { font-size: 1.2rem; font-weight: 900; color: var(--primary); letter-spacing: -0.5px; white-space: nowrap; }

        .search-container {
            flex-grow: 1;
            display: flex;
            background: var(--bg-body);
            border-radius: 20px;
            padding: 8px 12px;
            align-items: center;
        }

        .search-container input {
            border: none;
            background: transparent;
            outline: none;
            width: 100%;
            margin-left: 8px;
            font-family: inherit;
            color: var(--text-strong);
        }

        /* --- Player Integrato --- */
        .player-section { padding: 16px 20px 0; background: var(--bg-surface); }
        .video-container { width: 100%; aspect-ratio: 16 / 9; background: #000; border-radius: 12px; overflow: hidden; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .now-playing-info { padding: 12px 0; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
        .now-playing-title { margin: 0 0 4px; font-size: 1.2rem; font-weight: 800; }
        .now-playing-desc { margin: 0; font-size: 0.85rem; color: var(--text-muted); }

        /* --- Sezioni --- */
        .section { padding: 20px 0; border-bottom: 8px solid var(--bg-body); }
        .section:last-child { border-bottom: none; }
        .section-header { padding: 0 20px; margin-bottom: 16px; }
        .section-title { margin: 0; font-size: 1.1rem; font-weight: 700; }

        .play-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 36px; height: 36px; background: rgba(0,0,0,0.6); backdrop-filter: blur(2px); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .play-overlay::after { content: ''; border-style: solid; border-width: 6px 0 6px 10px; border-color: transparent transparent transparent #ffffff; margin-left: 3px; }
        .duration-badge { position: absolute; bottom: 6px; right: 6px; background: rgba(0,0,0,0.8); color: #fff; font-size: 0.65rem; font-weight: 600; padding: 2px 6px; border-radius: 4px; }

        /* --- Orizzontale (Continua a guardare) --- */
        .history-list { display: flex; gap: 16px; overflow-x: auto; padding: 0 20px 10px; scrollbar-width: none; }
        .history-list::-webkit-scrollbar { display: none; }
        .history-item { flex: 0 0 160px; cursor: pointer; }
        .history-cover { width: 100%; aspect-ratio: 16 / 9; background-color: #e2e8f0; border-radius: 8px; margin-bottom: 8px; position: relative; overflow: hidden; background-size: cover; background-position: center; }
        .progress-bar { position: absolute; bottom: 0; left: 0; height: 4px; background: rgba(255,255,255,0.3); width: 100%; }
        .progress-fill { height: 100%; background: var(--primary); }
        .history-title { margin: 0 0 4px; font-size: 0.85rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .history-ep { margin: 0; font-size: 0.75rem; color: var(--text-muted); }

        /* --- Verticale (Lezioni) --- */
        .ranking-list { padding: 0 20px; display: flex; flex-direction: column; gap: 16px; }
        .ranking-item { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .rank-number { font-size: 1.2rem; font-weight: 900; color: var(--text-muted); width: 20px; text-align: center; }
        .rank-cover { width: 100px; aspect-ratio: 16 / 9; background: #cbd5e1; border-radius: 6px; flex-shrink: 0; position: relative; background-size: cover; background-position: center; }
        .rank-info { flex-grow: 1; overflow: hidden; }
        .rank-title { margin: 0 0 4px; font-size: 0.95rem; font-weight: 600; }
        .rank-author { margin: 0 0 4px; font-size: 0.8rem; color: var(--text-muted); }
        .rank-views { font-size: 0.75rem; color: var(--primary); font-weight: 600; }

        /* --- Bottom Nav Aggiornata --- */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: var(--app-width); background: var(--bg-surface); display: flex; justify-content: space-around; padding: 12px 0 16px; border-top: 1px solid var(--border); z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-muted); font-size: 0.75rem; font-weight: 600; cursor: pointer; text-decoration: none; }
        .nav-item.active { color: var(--text-strong); }
        
        /* Messaggio "Nessun risultato" */
        .no-results { padding: 20px; text-align: center; color: var(--text-muted); font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="app">
        <!-- Header con barra di ricerca -->
        <header class="header">
            <div class="brand">EDU APP</div>
            <div class="search-container">
                <span style="font-size: 1rem;">🔍</span>
                <input type="text" id="searchInput" placeholder="Cerca lezione...">
            </div>
        </header>

        <!-- Player -->
        <div class="player-section">
            <div class="video-container">
                <video id="mainPlayer" controls playsinline poster="https://placehold.co/800x450/2c3e50/ffffff?text=Seleziona+una+lezione">
                    <source id="videoSource" src="" type="video/mp4">
                </video>
            </div>
            <div class="now-playing-info">
                <h2 class="now-playing-title" id="nowPlayingTitle">Benvenuto</h2>
                <p class="now-playing-desc" id="nowPlayingDesc">Seleziona una lezione dalla lista per iniziare</p>
            </div>
        </div>

        <!-- Sezione 1: Continua a guardare -->
        <section class="section" id="sectionHistory">
            <div class="section-header">
                <h3 class="section-title">Continua a guardare</h3>
            </div>
            <div class="history-list" id="historyList"></div>
        </section>

        <!-- Sezione 2: Lezioni -->
        <section class="section">
            <div class="section-header">
                <h3 class="section-title">Lezioni disponibili</h3>
            </div>
            <div class="ranking-list" id="lezioniList"></div>
        </section>

        <!-- Bottom Nav Aggiornata -->
        <nav class="bottom-nav">
            <a href="https://linguacoreana.netlify.app/#coreano" class="nav-item active">
                <span style="font-size: 1.2rem;">🏠</span>
                <span>Home</span>
            </a>
            <a href="https://linguacoreana.netlify.app/grammatica" class="nav-item">
                <span style="font-size: 1.2rem;">📖</span>
                <span>Grammatica</span>
            </a>
            <a href="https://linguacoreana.netlify.app/esercizi" class="nav-item">
                <span style="font-size: 1.2rem;">✏️</span>
                <span>Esercizi</span>
            </a>
        </nav>
    </div>

    <script>
        // Variabile globale per memorizzare i dati del JSON
        let videoData = { continuaGuardare: [], lezioni: [] };

        function loadVideo(videoUrl, title, desc) {
            const player = document.getElementById('mainPlayer');
            document.getElementById('videoSource').src = videoUrl;
            player.load();
            document.getElementById('nowPlayingTitle').textContent = title;
            document.getElementById('nowPlayingDesc').textContent = desc;
            window.scrollTo({ top: 0, behavior: 'smooth' });
            player.play().catch(e => console.log("Autoplay attende utente", e));
        }

        // Funzione per disegnare l'HTML in base agli array passati
        function renderVideoLists(datiContinua, datiLezioni) {
            const historyContainer = document.getElementById('historyList');
            const lezioniContainer = document.getElementById('lezioniList');
            const sectionHistory = document.getElementById('sectionHistory');

            // 1. Renderizza "Continua a guardare" (Nascondi la sezione se vuota durante la ricerca)
            if (datiContinua.length === 0) {
                sectionHistory.style.display = 'none';
            } else {
                sectionHistory.style.display = 'block';
                historyContainer.innerHTML = datiContinua.map(video => `
                    <div class="history-item" onclick="loadVideo('${video.videoUrl}', '${video.titolo}', '${video.descrizione}')">
                        <div class="history-cover" style="background-image: url('${video.coverUrl}');">
                            <div class="play-overlay"></div>
                            <span class="duration-badge">${video.durata}</span>
                            <div class="progress-bar"><div class="progress-fill" style="width: ${video.progresso}%;"></div></div>
                        </div>
                        <h4 class="history-title">${video.titolo}</h4>
                        <p class="history-ep">${video.testoAggiuntivo}</p>
                    </div>
                `).join('');
            }

            // 2. Renderizza "Lezioni"
            if (datiLezioni.length === 0) {
                lezioniContainer.innerHTML = `<div class="no-results">Nessuna lezione trovata.</div>`;
            } else {
                lezioniContainer.innerHTML = datiLezioni.map((video, index) => `
                    <div class="ranking-item" onclick="loadVideo('${video.videoUrl}', '${video.titolo}', '${video.descrizione}')">
                        <div class="rank-number">${index + 1}</div>
                        <div class="rank-cover" style="background-image: url('${video.coverUrl}');">
                            <div class="play-overlay" style="width: 24px; height: 24px;"></div>
                            <span class="duration-badge" style="bottom: 4px; right: 4px;">${video.durata}</span>
                        </div>
                        <div class="rank-info">
                            <h4 class="rank-title">${video.titolo}</h4>
                            <p class="rank-author">${video.autore}</p>
                            <span class="rank-views">${video.visualizzazioni}</span>
                        </div>
                    </div>
                `).join('');
            }
        }

        // Recupera i dati dal JSON all'avvio
        async function caricaDati() {
            try {
                const response = await fetch('data.json');
                videoData = await response.json(); // Salva i dati nella variabile globale
                renderVideoLists(videoData.continuaGuardare, videoData.lezioni); // Disegna tutto
            } catch (error) {
                console.error("Errore caricamento JSON:", error);
            }
        }

        // --- LOGICA DELLA RICERCA ---
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const query = e.target.value.toLowerCase(); // Testo digitato in minuscolo
            
            // Filtra l'array "continuaGuardare"
            const filteredContinua = videoData.continuaGuardare.filter(video => 
                video.titolo.toLowerCase().includes(query) || 
                video.descrizione.toLowerCase().includes(query)
            );

            // Filtra l'array "lezioni"
            const filteredLezioni = videoData.lezioni.filter(video => 
                video.titolo.toLowerCase().includes(query) || 
                video.descrizione.toLowerCase().includes(query)
            );

            // Ridisegna l'interfaccia con i risultati filtrati
            renderVideoLists(filteredContinua, filteredLezioni);
        });

        // Inizializza
        document.addEventListener('DOMContentLoaded', caricaDati);
    </script>
</body>
</html>
