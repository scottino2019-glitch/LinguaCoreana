<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한글 학교 - La Scuola di Coreano</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@300;400;500&display=swap');

        .font-korean-hand {
            font-family: 'Gaegu', cursive;
        }

        .font-korean-sans {
            font-family: 'Noto Sans KR', sans-serif;
        }

        /* SFONDO CARTA DA ZUCCHERO / DENIM (Mantenuto perché ti piaceva molto) */
        .denim-slate-bg {
            background-color: #2b3644;
            background-image: 
                radial-gradient(circle at 15% 15%, rgba(255, 255, 255, 0.04) 0%, transparent 50%),
                radial-gradient(circle at 85% 85%, rgba(0, 0, 0, 0.15) 0%, transparent 50%);
            position: relative;
            overflow-x: hidden;
        }

        /* SCRITTE DECORATIVE IN COREANO */
        .bg-text-element {
            position: absolute;
            font-family: 'Gaegu', cursive;
            color: rgba(255, 255, 255, 0.045);
            font-weight: 700;
            user-select: none;
            pointer-events: none;
            line-height: 1;
            z-index: 1;
        }

        /* LAVAGNETTA IN ACCENTO */
        .chalkboard-accent {
            background-color: #1e2733;
            background-image: linear-gradient(30deg, rgba(255,255,255,.01) 50%, transparent 50%),
                              linear-gradient(135deg, rgba(255,255,255,.02) 50%, transparent 50%);
            background-size: 8px 8px;
        }

        /* EFFETTO SCRIVANIA DISORDINATA (Foglietti inclinati ed interattivi) */
        .desk-note {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 2px 8px 15px rgba(0, 0, 0, 0.2);
        }

        .desk-note:hover {
            transform: scale(1.04) rotate(0deg) !important; /* Si raddrizza e si ingrandisce al passaggio del mouse */
            box-shadow: 10px 20px 30px rgba(0, 0, 0, 0.35);
            z-index: 50;
        }
    </style>
</head>
<body class="font-korean-sans text-slate-200 denim-slate-bg min-h-screen pb-20">

    <!-- LE SCRITTE CHE SPEZZANO IL FONDO -->
    <div class="bg-text-element text-8xl top-24 left-10 rotate-12">한국</div>
    <div class="bg-text-element text-9xl top-1/4 right-16 -rotate-12">한글</div>
    <div class="bg-text-element text-7xl top-2/4 left-16 -rotate-6">케이팝</div>
    <div class="bg-text-element text-8xl top-3/4 right-1/4 rotate-12">드라마</div>
    <div class="bg-text-element text-7xl bottom-20 left-1/3 -rotate-12">배우다</div>
    <div class="bg-text-element text-9xl bottom-12 left-10 rotate-6">K-Drama</div>

    <div class="relative z-10">
        <!-- Header -->
        <header class="shadow-md bg-[#232c38]/90 backdrop-blur-md p-4 border-b border-slate-700/50">
            <div class="max-w-6xl mx-auto flex justify-between items-center">
                <h1 class="text-3xl text-slate-100 tracking-wider font-korean-hand">
                    <i class="fa-solid fa-language mr-2 text-sky-300"></i> 수업 과정 
                </h1>
            </div>
        </header>

        <main class="max-w-6xl mx-auto p-4 sm:p-6 lg:p-8">
            <!-- Lavagnetta Banner -->
            <section class="mb-12 p-8 rounded-2xl chalkboard-accent border-4 border-[#354253] shadow-lg text-center transform -rotate-1 transition duration-500 hover:rotate-0">
                <p class="text-2xl sm:text-3xl font-korean-hand text-cyan-300 mb-2">환영합니다!</p>
                <h2 class="text-5xl sm:text-6xl font-korean-hand text-white uppercase leading-tight">
                    한국어 배우기
                </h2>
                <p class="mt-4 text-lg text-slate-300 max-w-2xl mx-auto font-light">
                    Impara la lingua in modo divertente e interattivo.
                </p>
            </section>

            <!-- Zona di studio (Scrivania) -->
            <section id="classes" class="mt-12">
                <h3 class="text-4xl font-korean-hand text-sky-300 mb-10 pb-3 border-b border-dashed border-slate-600/50">
                    연습문제 목록
                </h3>
                
                <!-- Struttura asimmetrica per spezzare l'allineamento rigido -->
                <div class="grid grid-cols-1 md:grid-cols-12 gap-6 items-stretch">
                    
                    <!-- Card 1: HANGUL (Spazio medio, ruotata leggermente a sinistra) - Gradiente Blu Notte/Azzurro -->
                    <div class="md:col-span-7 rotate-[-1.5deg] desk-note">
                        <a href="exsercice/hanguel.html" class="block h-full">      
                            <button class="w-full h-full text-left p-8 rounded-2xl border border-blue-400/20 bg-gradient-to-br from-blue-900/90 to-sky-900/80">
                                <i class="fa-solid fa-spell-check text-4xl text-sky-300 mb-4"></i>
                                <h4 class="text-3xl font-korean-hand text-sky-100 mb-3">한글 읽기/쓰기</h4>
                                <p class="text-slate-200/90 text-sm leading-relaxed font-light">Lettura e scrittura Hangul: dalle basi della fonetica ai primi testi per padroneggiare la scrittura.</p>
                            </button> 
                        </a>
                    </div>

                    <!-- Card 2: K-POP (Spazio piccolo, ruotata a destra) - Gradiente Viola/Fucsia -->
                    <div class="md:col-span-5 rotate-[2deg] desk-note">
                        <a href="exsercice/kpop.html" class="block h-full">    
                            <button class="w-full h-full text-left p-8 rounded-2xl border border-purple-400/20 bg-gradient-to-br from-purple-900/90 to-fuchsia-950/80">
                                <i class="fa-solid fa-microphone-lines text-4xl text-pink-300 mb-4"></i>
                                <h4 class="text-3xl font-korean-hand text-pink-200 mb-3">K-Pop 가사</h4>
                                <p class="text-slate-200/90 text-sm leading-relaxed font-light">Impara il coreano analizzando i testi delle tue canzoni preferite.</p>
                            </button>
                        </a>
                    </div>

                    <!-- Card 3: GRAMMATICA (Grande rilievo, ruotata a sinistra) - Gradiente Smeraldo/Verde scuro -->
                    <div class="md:col-span-5 rotate-[-1deg] desk-note">
                        <a href="exsercice/esercizi-grammatica.html" class="block h-full">      
                            <button class="w-full h-full text-left p-8 rounded-2xl border border-emerald-400/20 bg-gradient-to-br from-emerald-900/90 to-teal-950/80">
                                <i class="fa-solid fa-book text-4xl text-emerald-300 mb-4"></i>
                                <h4 class="text-3xl font-korean-hand text-emerald-200 mb-3">문법 연습</h4>
                                <p class="text-slate-200/90 text-sm leading-relaxed font-light">Tutti gli esercizi fondamentali sulla struttura grammaticale della lingua coreana.</p>
                            </button>
                        </a>
                    </div>

                    <!-- Card 4: PARTICELLE (Spazio medio, ruotata a destra) - Gradiente Ambra/Arancione -->
                    <div class="md:col-span-7 rotate-[1.5deg] desk-note">
                        <a href="exsercice/particelle.html" class="block h-full">     
                            <button class="w-full h-full text-left p-8 rounded-2xl border border-amber-500/20 bg-gradient-to-br from-amber-900/80 to-orange-950/80">
                                <i class="fa-solid fa-puzzle-piece text-4xl text-amber-300 mb-4"></i>
                                <h4 class="text-3xl font-korean-hand text-amber-100 mb-3">입자를 이용한 연습</h4>
                                <p class="text-slate-200/90 text-sm leading-relaxed font-light">Focus completo ed esercizi pratici per dominare l'uso delle insidiose particelle coreane.</p>
                            </button>
                        </a>
                    </div>

                    <!-- Card 5: VERBI (Medio-piccola, ruotata a sinistra) - Gradiente Rosso/Terracotta -->
                    <div class="md:col-span-4 rotate-[-2deg] desk-note">
                        <a href="exsercice/verbi.html" class="block h-full">     
                            <button class="w-full h-full text-left p-8 rounded-2xl border border-red-400/20 bg-gradient-to-br from-rose-950/90 to-red-900/80">
                                <i class="fa-solid fa-bolt text-4xl text-red-300 mb-4"></i>
                                <h4 class="text-3xl font-korean-hand text-rose-200 mb-3">동사 재구성</h4>
                                <p class="text-slate-200/90 text-sm leading-relaxed font-light">Impara a coniugare e ricreare le radici verbali.</p>
                            </button>
                        </a>
                    </div>

                    <!-- Card 6: CREAZIONE FRASI (Grande, ruotata a destra) - Gradiente Indigo/Teal -->
                    <div class="md:col-span-8 rotate-[1.2deg] desk-note">
                        <a href="exsercice/frasi.html" class="block h-full">     
                            <button class="w-full h-full text-left p-8 rounded-2xl border border-teal-400/20 bg-gradient-to-br from-indigo-950/95 to-teal-900/80">
                                <i class="fa-solid fa-lines-leaning text-4xl text-teal-300 mb-4"></i>
                                <h4 class="text-3xl font-korean-hand text-teal-100 mb-3">서강 문장 생성기</h4>
                                <p class="text-slate-200/90 text-sm leading-relaxed font-light">Un vero e proprio generatore interattivo per comporre frasi complete seguendo la logica e la sintassi coreana.</p>
                            </button>
                        </a>
                    </div>

                    <!-- Card 7: NUMERI (Spazio medio, ruotata a sinistra) - Gradiente Warm Bronze/Oro -->
                    <div class="md:col-span-6 rotate-[-1.8deg] desk-note">
                        <a href="exsercice/numerisino.html" class="block h-full">     
                            <button class="w-full h-full text-left p-8 rounded-2xl border border-yellow-500/20 bg-gradient-to-br from-[#5c4d3c] to-[#3a3025]">
                                <i class="fa-solid fa-arrow-down-1-9 text-4xl text-yellow-300 mb-4"></i>
                                <h4 class="text-3xl font-korean-hand text-yellow-200 mb-3">한자어 숫자</h4>
                                <p class="text-slate-200/90 text-sm leading-relaxed font-light">Allenamento focalizzato sul sistema dei numeri sino-coreani e dei relativi classificatori.</p>
                            </button>
                        </a>
                    </div>

                    <!-- Card 8: GIOCHI (Spazio medio, ruotata a destra) - Gradiente Lavagna Chiaro/Scura -->
                    <div class="md:col-span-6 rotate-[1.5deg] desk-note">
                        <a href="giochi.html" class="block h-full">    
                            <button class="w-full h-full text-left p-8 rounded-2xl border border-slate-400/20 bg-[#323d4c]/90">
                                <i class="fa-solid fa-memory text-4xl text-slate-300 mb-4"></i>
                                <h4 class="text-3xl font-korean-hand text-slate-100 mb-3">계략</h4>
                                <p class="text-slate-200/90 text-sm leading-relaxed font-light">Stacca dallo studio ed esercitati attivamente giocando con mini-games interattivi.</p>
                            </button>
                        </a>
                    </div>

                </div>
            </section>
        </main>
    </div>
</body>
</html>
