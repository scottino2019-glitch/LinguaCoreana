        function shuffleArray(array) {
            let newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        }

        function displayWord() {
            if (shuffledWords.length === 0) return;

            const word = shuffledWords[currentWordIndex];
            koreanWordEl.textContent = word.korean;
            romanizationEl.textContent = `[ ${word.romanization} ]`;
            italianTranslationEl.textContent = word.italian;

            // Reset visibilità
            italianTranslationEl.classList.add('hidden');
            romanizationEl.classList.add('hidden');
            revealBtn.textContent = "Mostra";
            
            updateProgress();
        }

        function revealTranslation() {
            if (italianTranslationEl.classList.contains('hidden')) {
                italianTranslationEl.classList.remove('hidden');
                romanizationEl.classList.remove('hidden');
                revealBtn.textContent = "Nascondi";
            } else {
                italianTranslationEl.classList.add('hidden');
                romanizationEl.classList.add('hidden');
                revealBtn.textContent = "Mostra";
            }
        }

        function speakKorean() {
            const textToSpeak = shuffledWords[currentWordIndex].korean;
            if ('speechSynthesis' in window) {
                // Ferma eventuali pronunce in corso
                speechSynthesis.cancel();
                
                const utterance = new SpeechSynthesisUtterance(textToSpeak);
                utterance.lang = 'ko-KR';
                utterance.rate = 0.85;
                speechSynthesis.speak(utterance);
            }
        }

        function nextWord() {
            currentWordIndex = (currentWordIndex + 1) % shuffledWords.length;
            displayWord();
        }

        function updateProgress() {
            progressInfoEl.textContent = `Parola ${currentWordIndex + 1} di ${shuffledWords.length}`;
        }

        function init() {
            shuffledWords = shuffleArray(words);
            currentWordIndex = 0;
            displayWord();
        }

        pronounceBtn.addEventListener('click', speakKorean);
        revealBtn.addEventListener('click', revealTranslation);
        nextBtn.addEventListener('click', nextWord);
        koreanWordEl.addEventListener('click', speakKorean);

        // Inizializza al caricamento
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
