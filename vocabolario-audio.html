        let currentWordIndex = 0;
        let shuffledWords = [];

        // Elementi DOM
        const koreanWordEl = document.getElementById('korean-word');
        const romanizationEl = document.getElementById('romanization');
        const italianTranslationEl = document.getElementById('italian-translation');
        const pronounceBtn = document.getElementById('pronounce-btn');
        const revealBtn = document.getElementById('reveal-btn');
        const nextBtn = document.getElementById('next-btn');
        const progressInfoEl = document.getElementById('progress-info');
        const categorySelectEl = document.getElementById('category-select');

        // Popola dinamicamente le opzioni del select in base alle categorie uniche
        function populateCategories() {
            const categories = [...new Set(words.map(w => w.category))].sort();
            categories.forEach(category => {
                const option = document.createElement('option');
                option.value = category;
                option.textContent = category;
                categorySelectEl.appendChild(option);
            });
        }

        // Funzione per mescolare un array
        function shuffleArray(array) {
            let newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        }

        // Filtra, mescola e resetta le parole in base alla categoria scelta
        function initCurrentCategory() {
            const selectedCategory = categorySelectEl.value;
            
            let filteredWords = words;
            if (selectedCategory !== "Tutte") {
                filteredWords = words.filter(w => w.category === selectedCategory);
            }

            shuffledWords = shuffleArray(filteredWords);
            currentWordIndex = 0;
            displayWord();
        }

        // Mostra la parola a schermo nascondendo la traduzione
        function displayWord() {
            if (shuffledWords.length === 0) return;

            const word = shuffledWords[currentWordIndex];
            koreanWordEl.textContent = word.korean;
            romanizationEl.textContent = `[ ${word.romanization} ]`;
            italianTranslationEl.textContent = word.italian;

            // Reset visibilità
            italianTranslationEl.classList.add('hidden');
            romanizationEl.classList.add('hidden');
            revealBtn.textContent = "Mostra";
            
            updateProgress();
        }

        // Alterna la visibilità di traduzione e romanizzazione
        function revealTranslation() {
            if (italianTranslationEl.classList.contains('hidden')) {
                italianTranslationEl.classList.remove('hidden');
                romanizationEl.classList.remove('hidden');
                revealBtn.textContent = "Nascondi";
            } else {
                italianTranslationEl.classList.add('hidden');
                romanizationEl.classList.add('hidden');
                revealBtn.textContent = "Mostra";
            }
        }

        // Pronuncia tramite Web Speech API
        function speakKorean() {
            const textToSpeak = shuffledWords[currentWordIndex].korean;
            if ('speechSynthesis' in window) {
                speechSynthesis.cancel(); // Ferma precedenti riproduzioni
                const utterance = new SpeechSynthesisUtterance(textToSpeak);
                utterance.lang = 'ko-KR';
                utterance.rate = 0.85; // Velocità leggermente rallentata per chiarezza
                speechSynthesis.speak(utterance);
            }
        }

        // Passa alla parola successiva (ciclico)
        function nextWord() {
            currentWordIndex = (currentWordIndex + 1) % shuffledWords.length;
            displayWord();
        }

        // Aggiorna l'etichetta col numero della parola attuale
        function updateProgress() {
            progressInfoEl.textContent = `Parola ${currentWordIndex + 1} di ${shuffledWords.length}`;
        }

        // Event listeners
        pronounceBtn.addEventListener('click', speakKorean);
        revealBtn.addEventListener('click', revealTranslation);
        nextBtn.addEventListener('click', nextWord);
        koreanWordEl.addEventListener('click', speakKorean);
        categorySelectEl.addEventListener('change', initCurrentCategory);

        // Inizializza al primo caricamento della pagina
        document.addEventListener('DOMContentLoaded', () => {
            populateCategories();
            initCurrentCategory();
        });
    </script>
